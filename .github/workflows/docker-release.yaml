---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Docker: Build and Push"

on:
  push:
    branches: ["main"]
    paths: ["containers/**"]
  pull_request:
    paths: ["containers/**"]

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm@sha256:896bfba10582c9239d1c36bab53b80af06253019f62b846fa440ee643ca63eb1
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@c1a285145b9d317df6ced56c09f525b5c2b6f755 # v1.11.1
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Install dependencies
        run: npm install

      - name: Generate matrix
        run: npm run genmatrix
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}

      - name: Save Matrix
        id: matrix
        run: |
          matrix=$(cat matrix.json)
          echo "matrix=${matrix}" | tee "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.job_name }}
    needs: generate-matrix
    uses: mirceanton/reusable-workflows/.github/workflows/reusable-docker-build-push.yaml@e7fc0b68ce5b8bf0f4c85d53928f91af6ec54357 # v3.4.36
    # if: ${{ fromJson(needs.generate-matrix.outputs.matrix)['include'].length > 0 }}
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    secrets: inherit
    with:
      image: ${{ matrix.image_name }}
      platforms: linux/amd64, linux/arm64
      tags: ${{ matrix.version }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      dry-run: false
