---
name: "Docker: Cleanup Images"

on:
  pull_request:
    types: ["closed"]
  push:
    paths: [".github/workflows/docker-cleanup-pr-images.yaml"]

concurrency:
  group: registry-tags-cleanup
  cancel-in-progress: false

jobs:
  cleanup-tagged-images:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.GHCR_RW_TOKEN }}
    steps:
      - name: Clean PR Images
        if: "${{ env.TOKEN != '' }}"
        uses: stumpylog/image-cleaner-action/ephemeral@v0.8.0
        with:
          token: "${{ env.TOKEN }}"
          owner: "${{ github.repository_owner }}"
          is_org: "true"
          do_delete: "true"
          package_name: "${{ matrix.primary-name }}"
          scheme: "pull_request"
          repo_name: "${{ github.repository }}"
          match_regex: '^pr-(\d+)$|^(\d+)$'

  cleanup-untagged-images:
    runs-on: ubuntu-latest
    needs:
      - cleanup-images
    env:
      TOKEN: ${{ secrets.GHCR_RW_TOKEN }}
    steps:
      - name: Clean untagged images
        if: "${{ env.TOKEN != '' }}"
        uses: stumpylog/image-cleaner-action/untagged@v0.8.0
        with:
          token: "${{ env.TOKEN }}"
          owner: "immich-app"
          do_delete: "true"
          is_org: "true"
          package_name: "${{ matrix.primary-name }}"
